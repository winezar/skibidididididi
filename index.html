<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #e8ff47;
      --accent2: #ff4f9b;
      --glass: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -150px; animation-delay: 0s; }
    .blob2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -4s; }
    .blob3 { width: 300px; height: 300px; background: #7b47ff; top: 40%; left: 40%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    /* Noise texture overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 56px 48px 48px;
      width: min(420px, 92vw);
      text-align: center;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px var(--border), 0 40px 80px rgba(0,0,0,0.5);
    }

    .label {
      font-family: 'Unbounded', sans-serif;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(22px, 5vw, 30px);
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 40px;
    }
    h1 span { color: var(--accent); }

    /* Big play button */
    .play-btn {
      position: relative;
      width: 140px; height: 140px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 40px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 0 0 0 rgba(232,255,71,0.4);
    }
    .play-btn:hover { transform: scale(1.06); box-shadow: 0 0 40px rgba(232,255,71,0.35); }
    .play-btn:active { transform: scale(0.97); }

    .play-btn svg { width: 52px; height: 52px; fill: #0a0a0f; transition: transform 0.2s; }

    /* Pulse ring while playing */
    .play-btn.playing {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(232,255,71,0.5); }
      50%       { box-shadow: 0 0 0 22px rgba(232,255,71,0); }
    }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 40px;
      margin-bottom: 28px;
    }
    .bar {
      width: 4px;
      border-radius: 4px;
      background: var(--accent);
      opacity: 0.25;
      transition: opacity 0.3s;
    }
    .waveform.active .bar {
      opacity: 1;
      animation: wave 0.8s ease-in-out infinite alternate;
    }
    .bar:nth-child(1)  { height: 14px; animation-delay: 0.0s; }
    .bar:nth-child(2)  { height: 22px; animation-delay: 0.1s; }
    .bar:nth-child(3)  { height: 30px; animation-delay: 0.05s; }
    .bar:nth-child(4)  { height: 38px; animation-delay: 0.15s; }
    .bar:nth-child(5)  { height: 24px; animation-delay: 0.08s; }
    .bar:nth-child(6)  { height: 36px; animation-delay: 0.2s; }
    .bar:nth-child(7)  { height: 20px; animation-delay: 0.03s; }
    .bar:nth-child(8)  { height: 32px; animation-delay: 0.12s; }
    .bar:nth-child(9)  { height: 18px; animation-delay: 0.07s; }
    .bar:nth-child(10) { height: 28px; animation-delay: 0.17s; }
    .bar:nth-child(11) { height: 14px; animation-delay: 0.04s; }

    @keyframes wave {
      from { transform: scaleY(0.5); }
      to   { transform: scaleY(1.1); }
    }

    /* Progress bar */
    .progress-wrap {
      position: relative;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      margin-bottom: 10px;
      cursor: pointer;
      overflow: visible;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }
    .progress-thumb {
      position: absolute;
      right: -6px; top: -4px;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(232,255,71,0.6);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .progress-wrap:hover .progress-thumb { opacity: 1; }

    .time-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-variant-numeric: tabular-nums;
      margin-bottom: 28px;
    }

    /* File input */
    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      cursor: pointer;
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 20px;
      transition: border-color 0.2s, color 0.2s;
    }
    .file-label:hover { border-color: var(--accent); color: var(--accent); }
    .file-label svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
    #fileInput { display: none; }

    .filename {
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      margin-top: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
  </style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">
  <div class="label">Voice Message</div>
  <h1>Нажми<br/><span>и слушай</span></h1>

  <button class="play-btn" id="playBtn" onclick="togglePlay()">
    <!-- Play icon -->
    <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <!-- Pause icon (hidden by default) -->
    <svg id="iconPause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
  </button>

  <div class="waveform" id="waveform">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>

  <div class="progress-wrap" id="progressWrap" onclick="seek(event)">
    <div class="progress-fill" id="progressFill"></div>
    <div class="progress-thumb" id="progressThumb"></div>
  </div>
  <div class="time-row">
    <span id="timeElapsed">0:00</span>
    <span id="timeDuration">0:00</span>
  </div>

  <label class="file-label" for="fileInput">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14.93V17a1 1 0 0 1-2 0v-.07A8 8 0 0 1 4.07 11H5a1 1 0 0 1 0 2 6 6 0 0 0 6 6zm0-9.86V7a1 1 0 0 1 2 0v.07A8 8 0 0 1 19.93 13H19a1 1 0 0 1 0-2 6 6 0 0 0-6-6z"/></svg>
    Загрузить .ogg / .mp3
  </label>
  <input type="file" id="fileInput" accept=".mp3,.ogg,audio/*" onchange="loadFile(event)"/>
  <div class="filename" id="filename">или положи audio.mp3 рядом с файлом</div>
</div>

<audio id="audio" volume="1"></audio>

<script>
  const audio = document.getElementById('audio');
  const playBtn = document.getElementById('playBtn');
  const iconPlay = document.getElementById('iconPlay');
  const iconPause = document.getElementById('iconPause');
  const waveform = document.getElementById('waveform');
  const progressFill = document.getElementById('progressFill');
  const progressThumb = document.getElementById('progressThumb');
  const timeElapsed = document.getElementById('timeElapsed');
  const timeDuration = document.getElementById('timeDuration');
  const filenameEl = document.getElementById('filename');

  // Громкость на максимум
  audio.volume = 1.0;

  // Попробовать загрузить audio.mp3 по умолчанию
  audio.src = 'audio.mp3';

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  }

  audio.addEventListener('loadedmetadata', () => {
    timeDuration.textContent = fmt(audio.duration);
  });

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressFill.style.width = pct + '%';
    progressThumb.style.right = (100 - pct) + '%'; // track thumb position
    timeElapsed.textContent = fmt(audio.currentTime);
  });

  audio.addEventListener('ended', () => {
    setPlaying(false);
    progressFill.style.width = '0%';
    timeElapsed.textContent = '0:00';
  });

  function setPlaying(state) {
    if (state) {
      playBtn.classList.add('playing');
      waveform.classList.add('active');
      iconPlay.style.display = 'none';
      iconPause.style.display = '';
    } else {
      playBtn.classList.remove('playing');
      waveform.classList.remove('active');
      iconPlay.style.display = '';
      iconPause.style.display = 'none';
    }
  }

  function togglePlay() {
    if (!audio.src && !audio.currentSrc) return;
    if (audio.paused) {
      audio.volume = 1.0;
      audio.play().then(() => setPlaying(true)).catch(() => {});
    } else {
      audio.pause();
      setPlaying(false);
    }
  }

  function seek(e) {
    if (!audio.duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  }

  function loadFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    audio.src = url;
    audio.volume = 1.0;
    filenameEl.textContent = file.name;
    setPlaying(false);
    progressFill.style.width = '0%';
    timeElapsed.textContent = '0:00';
  }

  // Исправление позиции thumb
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    progressThumb.style.left = `calc(${pct}% - 6px)`;
    progressThumb.style.right = 'auto';
  });
</script>
</body>
</html>
